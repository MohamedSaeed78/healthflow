name: healthflow
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+1

environment:
  #  sdk: "3.0.1"
  sdk: "3.2.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^4.0.4
  carousel_slider: ^4.0.0
  font_awesome_flutter: ^10.1.0
  curved_navigation_bar: 1.0.3
  camera: ^0.8.1+3
  image: ^3.3.0
  image_picker: ^0.8.7+3
  flutter_gif: ^0.0.4
  sensors_plus: ^3.0.2
  fluttertoast: ^8.2.2
  flutter_tts: ^3.7.0
  lottie: ^2.3.2
  path_provider: ^2.0.14
  tflite_flutter: ^0.9.1
  tflite_flutter_helper:
    git:
      url: https://github.com/filofan1/tflite_flutter_helper.git
      ref: 783f15e5a87126159147d8ea30b98eea9207ac70
  flutter_gemini: 3.0.0
  firebase_auth: ^4.16.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  flutter_native_splash: ^2.2.16
  icons_launcher: ^2.0.7
  



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1




flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/models/
    - assets/img/
    - assets/exercises/3_4_Sit-Up/
    - assets/exercises/Ab_Crunch_Machine/
    - assets/exercises/Ab_Roller/
    - assets/exercises/Advanced_Kettlebell_Windmill/
    - assets/exercises/All_Fours_Quad_Stretch/
    - assets/exercises/Alternate_Hammer_Curl/
    - assets/exercises/Alternate_Heel_Touchers/
    - assets/exercises/Alternating_Hang_Clean/
    - assets/exercises/Alternating_Renegade_Row/
    - assets/exercises/Arnold_Dumbbell_Press/
    - assets/exercises/Atlas_Stones/
    - assets/exercises/Axle_Deadlift/
    - assets/exercises/Backward_Drag/
    - assets/exercises/Bench_Jump/
    - assets/exercises/Body-Up/
    - assets/exercises/Butt_Lift_Bridge/
    - assets/exercises/Chin-Up/
    - assets/exercises/Clock_Push-Up/
    - assets/exercises/Close-Grip_Push-Up_off_of_a_Dumbbell/
    - assets/exercises/Cross-Body_Crunch/


  fonts:
    - family: Alex
      fonts:
        - asset: assets/fonts/Alexandria.ttf
    - family: Allerta
      fonts:
        - asset: assets/fonts/Allerta.ttf


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/img/Logo_only_splash.png

  android_12:
    image: assets/img/Logo_only_splash.png

    # Splash screen background color.
    color: "#FFFFFF"


icons_launcher:
  image_path: "assets/img/logo_only.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true